geometry:
  edit_type: compose_multi
  prompt_inpaint: >-
    Indoor scene with blurred background of dark interior tabletop.
  prompt_refine: >-
    A bishop and queen chess pieces on a dark interior tabletop against a dark, blurred background.
  removal_masks:
    - inputs/freefine/.freefine_checkout/Examples/Compose/pair2/source_mask.png
  compose:
    - paste_mask: inputs/freefine/.freefine_checkout/Examples/Compose/pair2/target_mask.png
      dx: 100
      dy: -30
