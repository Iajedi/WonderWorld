# Second-stage seam band (build_boundary_blur_mask)
seam_band_kernel: 5
seam_blur_radius: 2.0
# Asymmetric taper: smaller => steeper falloff *into* the mask; larger => gentler *outside*
seam_sigma_inside: 1.0
seam_sigma_outside: 12.0

# --- BCOTHVE / UniEdit (same knobs as configs/inpaint.yaml) ---
T: 50
K: 10
warm_method: ot_harmonic

lambda_pos: 0.1
lambda_bdry: 1.0
tau: 0.05
sinkhorn_iters: 100

lambda_s: 0.5
connectivity: 8

alpha_start: 0.96
alpha_end: 0.6

boundary_band_width: 3

warm_layers:
  - [double, 0]
  - [double, 4]
  - [single, 4]
  - [single, 5]
  - [single, 15]
  - [single, 19]

omega: 4.0
alpha_edit: 0.4

observed_reinject: true
reinject_unknown_expand_px: 12
reinject_mask_dilate: 3

debug: false
